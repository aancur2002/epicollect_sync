name: Run EpiCollect Sync

on:
  schedule:
    # Nepal Time: 10:00, 10:30, 11:00, 11:30, 12:00
    # Converted to UTC
    - cron: '15,45 4-5 * * *'
    - cron: '15 6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repo content
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Install python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔐 Create .env file from secrets
        run: |
          echo "DB_SERVER=${{ secrets.DB_SERVER }}" >> .env
          echo "DB_DATABASE=${{ secrets.DB_DATABASE }}" >> .env
          echo "DB_USERNAME=${{ secrets.DB_USERNAME }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "DEFAULT_DAYS=${{ secrets.DEFAULT_DAYS }}" >> .env
          echo "API_URL=${{ secrets.API_URL }}" >> .env

      - name: ▶️ Execute script
        run: python epicollect.py --verbose

      # ✅ OPTIONAL: commit logs back to repo
      - name: 📌 Commit logs
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff-index --quiet HEAD || git commit -m "Update logs"

      - name: 🚀 Push changes
        uses: ad-m/github-push-action@v0.6.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
